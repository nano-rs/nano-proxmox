worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80 default_server;

        # Resolve upstream container names via Docker's embedded DNS on every
        # request instead of caching the IP at startup. Without this, recreating
        # nano-api / nano-search (e.g. `docker compose pull && up -d`, or an
        # install.sh upgrade) gives them new IPs while nginx keeps proxying the
        # old ones -> 502 until nginx is manually restarted.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Using variables in proxy_pass forces per-request re-resolution.
        set $nano_api    http://nano-api:3000;
        set $nano_search http://nano-search:3002;
        set $nano_web    http://nano-web:5173;
        set $nano_vector http://vector:8080;

        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Search-service overrides handled by nano-api (order matters — before /api/search).
        location = /api/search/history     { proxy_pass $nano_api; }
        location = /api/search/share       { proxy_pass $nano_api; }
        location = /api/search/shared       { proxy_pass $nano_api; }
        location = /api/search/explanation { proxy_pass $nano_api; }

        # Search service
        location /api/search {
            proxy_pass $nano_search;
            proxy_read_timeout 300s;
        }

        # API health alias -> nano-api /health
        location = /api/health {
            proxy_pass $nano_api/health;
        }

        # All other API routes
        location /api/ {
            proxy_pass $nano_api;
            proxy_read_timeout 120s;
        }

        # Swagger / OpenAPI docs
        location /swagger-ui/ { proxy_pass $nano_api; }
        location /api-docs/   { proxy_pass $nano_api; }

        # Log ingestion (HTTP) — strip the /ingest/ prefix
        location /ingest/ {
            rewrite ^/ingest/(.*)$ /$1 break;
            proxy_pass $nano_vector;
            client_max_body_size 100m;
        }

        # Frontend SPA (everything else)
        location / {
            proxy_pass $nano_web;
        }
    }
}
